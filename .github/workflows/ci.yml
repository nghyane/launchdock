name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        if: runner.os != 'Windows'
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/launchdock
