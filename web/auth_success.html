<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <style>
      :root {
        --bg: #f5f7f4;
        --panel: rgba(255, 255, 255, 0.84);
        --text: #182019;
        --muted: rgba(24, 32, 25, 0.68);
        --border: rgba(24, 32, 25, 0.1);
        --accent: #1f6b4f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(31, 107, 79, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(86, 156, 116, 0.16), transparent 24%),
          var(--bg);
        color: var(--text);
        font-family: Iowan Old Style, Charter, Georgia, serif;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(620px, 100%);
        padding: 36px 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 60px rgba(17, 24, 20, 0.08);
        text-align: center;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font: 600 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(31, 107, 79, 0.12);
      }
      h1 {
        margin: 24px 0 10px;
        font-size: clamp(34px, 6vw, 52px);
        line-height: 1.05;
        font-weight: 500;
      }
      p {
        margin: 0 auto;
        max-width: 460px;
        color: var(--muted);
        font: 400 18px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="eyebrow"><span class="dot"></span>{{.Provider}}</div>
        <h1>{{.Title}}</h1>
        <p>{{.Message}}</p>
      </div>
    </div>
  </body>
</html>
