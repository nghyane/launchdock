<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <style>
      :root {
        --bg: #faf6f3;
        --panel: rgba(255, 255, 255, 0.9);
        --text: #241814;
        --muted: rgba(36, 24, 20, 0.72);
        --border: rgba(103, 48, 29, 0.16);
        --accent: #b4512d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, rgba(180, 81, 45, 0.12), transparent 28%),
          radial-gradient(circle at bottom left, rgba(210, 124, 79, 0.15), transparent 24%),
          var(--bg);
        color: var(--text);
        font-family: Iowan Old Style, Charter, Georgia, serif;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(620px, 100%);
        padding: 36px 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 18px 60px rgba(46, 26, 20, 0.08);
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font: 600 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(180, 81, 45, 0.12);
      }
      h1 {
        margin: 24px 0 10px;
        font-size: clamp(32px, 5vw, 46px);
        line-height: 1.08;
        font-weight: 500;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        font: 400 18px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .detail {
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
        font: 500 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="eyebrow"><span class="dot"></span>{{.Provider}}</div>
        <h1>{{.Title}}</h1>
        <p>{{.Message}}</p>
        {{if .Detail}}<div class="detail">{{.Detail}}</div>{{end}}
      </div>
    </div>
  </body>
</html>
